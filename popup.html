<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Translate</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <div class="header">
      <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22">
        <path fill="#4285F4" d="M20 5h-9.12L10 2H4c-1.1 0-2 .9-2 2v13c0 1.1.9 2 2 2h7l1 3h8c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zM4 4h5.08l.92 3H4V4zm7.04 11.24c-2.24-.73-4.08-2.4-4.88-4.24h2.4c.32.8.8 1.56 1.44 2.24-.32.64-.64 1.32-.96 2zm-1.04-4.24H7.08C7.04 10.68 7 10.36 7 10s.04-.68.08-1H10v2zm-3.96-3h2.92C8.96 7.28 9.44 6.64 10 6.12 8.72 6.4 7.6 7.2 6.04 8zm6.96 6c.6-.68 1.08-1.44 1.4-2.24h-2.8C11.92 12.56 12.36 13.32 13 14zm0-5H10.2C9.96 8.36 9.52 7.64 9 7c.56.48 1.04.96 1.44 1.52L11.56 9H13v.76l.6.24h-.6zm7 7h-6v-1.96c.4.28.84.52 1.32.76l.36-.92c-.6-.28-1.12-.6-1.56-1.04H15c.24.4.52.76.84 1.08l.64-.6c-.52-.52-.96-1.12-1.28-1.8h2.8v-.52l-3.24-1.32A4.7 4.7 0 0 1 13 9.5V9h1.56l.56-.2V9H17v1h-2.04l2.04.84V11h1v-1h1v6.08c0 .52-.44.92-1 .92z"/>
      </svg>
      <span class="title">Quick Translate</span>
    </div>

    <div id="errorMsg" class="error hidden">
      Cannot translate this page.
    </div>

    <div id="mainContent">
      <div class="section">
        <div class="section-label">Recent languages</div>
        <div class="recent-buttons" id="recentButtons">
          <!-- Populated by popup.js -->
        </div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <div class="section-label">All languages</div>
        <div class="search-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
            <path fill="#5f6368" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search languages..."
            autocomplete="off"
            spellcheck="false"
          >
        </div>
        <div class="language-list" id="languageList">
          <!-- Populated by popup.js -->
        </div>
      </div>
    </div>

  </div>
  <script src="languages.js"></script>
  <script src="popup.js"></script>
</body>
</html>
